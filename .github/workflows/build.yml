name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-maccatalyst:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maccatalyst

      - name: Build
        run: dotnet build src/RealtimeTranscribe/RealtimeTranscribe.csproj -f net10.0-maccatalyst -c Release
