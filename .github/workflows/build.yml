name: PR Build & Test

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-maccatalyst

      - name: Build solution
        run: dotnet build RealtimeTranscribe.sln -c Debug

      - name: Run tests
        run: dotnet test tests/RealtimeTranscribe.Tests/RealtimeTranscribe.Tests.csproj -c Debug --no-build --logger "console;verbosity=normal"
