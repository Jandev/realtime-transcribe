name: Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maccatalyst

      - name: Compute version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="1.0.${{ github.run_number }}"
          TAG="v${VERSION}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"     >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"             >> "$GITHUB_OUTPUT"

      - name: Build solution
        run: dotnet build RealtimeTranscribe.sln -c Release

      - name: Run tests
        run: dotnet test tests/RealtimeTranscribe.Tests/RealtimeTranscribe.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

      - name: Publish Mac Catalyst app
        run: |
          dotnet publish src/RealtimeTranscribe/RealtimeTranscribe.csproj \
            -f net10.0-maccatalyst \
            -c Release \
            --output ./publish \
            /p:ApplicationDisplayVersion=${{ steps.version.outputs.version }} \
            /p:ApplicationVersion=${{ github.run_number }}

      - name: Archive artifact
        run: |
          ARTIFACT="RealtimeTranscribe-${{ steps.version.outputs.tag }}-${{ steps.version.outputs.short_sha }}.zip"
          zip -r "$ARTIFACT" ./publish
          echo "ARTIFACT=${ARTIFACT}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Release ${{ steps.version.outputs.tag }} (commit ${{ steps.version.outputs.short_sha }})" \
            --notes "Automated release for commit [${{ steps.version.outputs.short_sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" \
            "${{ env.ARTIFACT }}"
