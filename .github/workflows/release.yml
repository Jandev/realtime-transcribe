name: Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-maccatalyst

      - name: Compute version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="1.0.${{ github.run_number }}"
          TAG="v${VERSION}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"     >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"             >> "$GITHUB_OUTPUT"

      - name: Build solution
        run: dotnet build RealtimeTranscribe.sln -c Release

      - name: Run tests
        run: dotnet test tests/RealtimeTranscribe.Tests/RealtimeTranscribe.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

      - name: Publish Mac Catalyst app
        run: |
          dotnet publish src/RealtimeTranscribe/RealtimeTranscribe.csproj \
            -f net10.0-maccatalyst \
            -c Release \
            --output ./publish \
            /p:ApplicationDisplayVersion=${{ steps.version.outputs.version }} \
            /p:ApplicationVersion=${{ github.run_number }}

      - name: Validate signing secrets are configured
        run: |
          missing=()
          [[ -z "${{ secrets.MACOS_CERTIFICATE }}" ]]            && missing+=("MACOS_CERTIFICATE")
          [[ -z "${{ secrets.MACOS_CERTIFICATE_PWD }}" ]]        && missing+=("MACOS_CERTIFICATE_PWD")
          [[ -z "${{ secrets.MACOS_KEYCHAIN_PASSWORD }}" ]]      && missing+=("MACOS_KEYCHAIN_PASSWORD")
          [[ -z "${{ secrets.APPLE_ID }}" ]]                     && missing+=("APPLE_ID")
          [[ -z "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" ]]  && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          [[ -z "${{ secrets.APPLE_TEAM_ID }}" ]]                && missing+=("APPLE_TEAM_ID")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: The following required signing secrets are not configured:" >&2
            for s in "${missing[@]}"; do echo "  - $s" >&2; done
            echo "See docs/release-signing-runbook.md for setup instructions." >&2
            exit 1
          fi
          echo "All signing secrets are present."

      - name: Make scripts executable
        run: chmod +x scripts/sign-and-notarize.sh scripts/verify-release.sh

      - name: Sign, notarize, and staple release package
        env:
          MACOS_CERTIFICATE:           ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD:       ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PASSWORD:     ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          APP_BUNDLE_ID:               com.jandev.realtimetranscribe
        run: |
          PKG_PATH="RealtimeTranscribe-${{ steps.version.outputs.tag }}-${{ steps.version.outputs.short_sha }}.pkg"
          ./scripts/sign-and-notarize.sh ./publish "${{ steps.version.outputs.version }}" "$PKG_PATH"
          echo "ARTIFACT=${PKG_PATH}" >> "$GITHUB_ENV"

      - name: Verify signed release artifact
        run: ./scripts/verify-release.sh "${{ env.ARTIFACT }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Release ${{ steps.version.outputs.tag }} (commit ${{ steps.version.outputs.short_sha }})" \
            --notes "Automated release for commit [${{ steps.version.outputs.short_sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" \
            "${{ env.ARTIFACT }}"
